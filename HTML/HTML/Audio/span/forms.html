<!DOCTYPE html>

<html>

    <title> Forms </title>

    <body> 
        <h1 style="font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: blue;" align="center">All Forms</h1>
        <hr>


        <label for="Member">Choose Your Member: </label>
        <select id="Member">
            <optgroup label="Family Member"> 
                <option value="Janrich">Janrich</option>
                <option value="Erika">Erika</option>
                <option value="Ulrich">Ulrich</option>
            </optgroup>
        </select> 
        <br/>
        <select names="fruits">
            <option value="Mango"> Mango </option>
            <option value="Banana"> Banana </option>
            <option value="Grapes"> Grapes </option>
        </select> <br/>
        <input type="submit"/><br/>

        <br/>
        <hr>
        <br/>

        <textarea cols="30" rows="10" maxlength="50">Enter Text</textarea><br/>
        <input type="submit"/><br/>

        <br/>
        <hr>
        <br/>

        <input type="color" value="#ffffff"/><br/>
        <input type="submit"/><br/>

        <br/>
        <hr>
        <br/>

        <input type="range" min="0" max="100" value="50"/><br/>
        <input type="submit"/><br/>

        <br/>
        <hr>
        <br/>
        
        <form>
            <input type="button" value="Click me"/><br/>
            <input type="submit"/>
        </form>

        <br/>
        <hr>
        <br/>

        <form target="_blank">
                <input type="text" minlength="6" placeholder="Username" required><br/>
                <input type="email" placeholder="Email" required><br/>
                <input type="password" minlength="6" placeholder="Password" required/><br/>
                <input type="submit"/> <input type="reset"/>
        </form>

        <br/>
        <hr>
        <br/>

        <form>
            <input type="date" min="2021-12-31" max="2026-12-31"/><br/>
            <input type="submit"/><br/>
        </form>

        <br/>
        <hr>
        <br/>

        <form>
            <input type="file" accept="image/*" multiple/><br/>

            <input id="apple" type="checkbox"/> 
            <label for="fruits"> apple </label><br/>

            <input id="yes" name="answer" type="radio"/> 
            <label for="yes"> Yes </label><br/>

            <input id="no" name="answer" type="radio"/> 
            <label for="no"> No </label>
        </form>
        
    </body>

</html>
